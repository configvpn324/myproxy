name: Run Proxy Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install express
      - run: node server.js &
      - run: npx localtunnel --port 3000
